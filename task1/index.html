<!DOCTYPE html>
<html>
<head>
<title>Student Registration</title>
<style>
body{
font-family: Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:20px;
width:300px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
}

button{
width:100%;
padding:10px;
background:blue;
color:white;
border:none;
}

@media(max-width:600px){
.container{
width:90%;
}
}
</style>
</head>

<body>

<div class="container">
<h2>Student Registration</h2>

<form onsubmit="showMessage(event)">
<input type="text" placeholder="Name" required>
<input type="email" placeholder="Email" required>
<input type="text" placeholder="Course" required>

<button type="submit">Submit</button>
</form>

<p id="msg"></p>

</div>

<script>
function showMessage(e){
e.preventDefault();
document.getElementById("msg").innerHTML="Registration Successful!";
}
</script>

</body>
</html>
